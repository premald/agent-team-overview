<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
  <rect width="900" height="260" fill="#f8f8f8"/>
  <g font-family="sans-serif" font-size="18" fill="#1f1f1f" text-anchor="middle">
    <rect x="40" y="90" width="140" height="60" rx="10" fill="#e8f0ff" stroke="#7a8aa1"/>
    <text x="110" y="128">Plan</text>

    <rect x="210" y="90" width="140" height="60" rx="10" fill="#e8f0ff" stroke="#7a8aa1"/>
    <text x="280" y="128">Build</text>

    <rect x="380" y="90" width="140" height="60" rx="10" fill="#e8f0ff" stroke="#7a8aa1"/>
    <text x="450" y="128">Review</text>

    <rect x="550" y="90" width="140" height="60" rx="10" fill="#e8f0ff" stroke="#7a8aa1"/>
    <text x="620" y="128">Test</text>

    <rect x="720" y="90" width="140" height="60" rx="10" fill="#e8f0ff" stroke="#7a8aa1"/>
    <text x="790" y="128">Log</text>
  </g>

  <g stroke="#7a8aa1" stroke-width="2">
    <line x1="180" y1="120" x2="210" y2="120"/>
    <line x1="350" y1="120" x2="380" y2="120"/>
    <line x1="520" y1="120" x2="550" y2="120"/>
    <line x1="690" y1="120" x2="720" y2="120"/>
  </g>
</svg>
